name: Weekly League Update

# Runs every Tuesday morning, and can also be triggered manually from
# the Actions tab on GitHub (useful for testing, or a mid-week refresh).
on:
  schedule:
    # 11:00 UTC = 7am Eastern (during daylight saving) / 6am Eastern (standard time).
    # Cron times are always UTC, so adjust this number if you want a
    # different local time. https://crontab.guru is helpful for this.
    - cron: '0 11 * * 2'
  workflow_dispatch:

# Needed so this workflow is allowed to commit the updated data files
# back to the repository.
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly update
        env:
          LEAGUE_ID: ${{ secrets.LEAGUE_ID }}
          LEAGUE_YEAR: ${{ secrets.LEAGUE_YEAR }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONPATH: scripts
        run: python scripts/main.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Weekly league update: $(date -u +'%Y-%m-%d')"
          git push
